name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build .app bundle
        run: |
          chmod +x build-app.sh
          ./build-app.sh

      - name: Package .app as zip
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="quick-json-viewer-${VERSION}.zip"
          zip -r "$ARCHIVE" quick-json-viewer.app
          SHA256=$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')
          echo "Archive : $ARCHIVE"
          echo "SHA256  : $SHA256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "SHA256=$SHA256"   >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Generate release notes
        env:
          VERSION: ${{ env.VERSION }}
          SHA256: ${{ env.SHA256 }}
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}"^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --pretty=format:"%h %s")
          else
            COMMITS=$(git log "${PREV_TAG}..${CURRENT_TAG}" --oneline --pretty=format:"%h %s")
          fi

          # Filter out chore commits and format as release notes
          {
            echo "## Changes"
            echo ""
            while IFS= read -r line; do
              if [[ ! "$line" =~ chore: ]]; then
                HASH=$(echo "$line" | awk '{print $1}')
                MESSAGE=$(echo "$line" | cut -d' ' -f2-)
                echo "- $MESSAGE ($HASH)"
              fi
            done <<< "$COMMITS"
            echo ""
            echo "## Install via Homebrew"
            echo ""
            echo '```sh'
            echo "brew install --cask evyatar/tap/quick-json-viewer"
            echo '```'
            echo ""
            echo "After installing, update the cask's \`sha256\` and \`version\` in your tap:"
            echo "- **Version**: \`${VERSION}\`"
            echo "- **SHA256**: \`${SHA256}\`"
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          body_path: release_notes.md
