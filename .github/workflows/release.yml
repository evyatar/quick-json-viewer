name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build .app bundle
        run: |
          chmod +x build-app.sh
          ./build-app.sh

      - name: Package .app as zip
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="quick-json-viewer-${VERSION}.zip"
          zip -r "$ARCHIVE" quick-json-viewer.app
          SHA256=$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')
          echo "Archive : $ARCHIVE"
          echo "SHA256  : $SHA256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "SHA256=$SHA256"   >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true
          body: |
            ## Install via Homebrew

            ```sh
            brew install --cask evyatar/tap/quick-json-viewer
            ```

            After installing, update the cask's `sha256` and `version` in your tap:
            - **Version**: `${{ env.VERSION }}`
            - **SHA256**: `${{ env.SHA256 }}`
